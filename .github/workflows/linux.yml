name: Linux

on: [push]

env:
  BUILD_TYPE: Release

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v2
   
    - name: Install packages
      uses: ryankurte/action-apt@v0.2.0
      with:
        packages: sqlcipher libboost-all-dev libevent-dev libdb-dev libdb++-dev build-essential libtool autotools-dev automake pkg-config bsdmainutils python3

    - uses: actions/cache@v2
      id: cache
      with:
        path: contrib
        key: 543693b92b954d186cb466a2f14b480f3bcf8c0b
       
    - name: Checkout submodules
      if: steps.cache.outputs.cache-hit != 'true'
      run: git submodule update --depth 1 --init --recursive

    - name: Build Bitcoin Core
      if: steps.cache.outputs.cache-hit != 'true'
      working-directory: ./contrib/bitcoin
      run: |
        ./autogen.sh
        ./configure --without-gui --disable-zmq --with-miniupnpc=no --with-incompatible-bdb
        make -j8

    - name: Create Build Environment
      run: cmake -E make_directory ${{runner.workspace}}/build

    - name: Configure CMake
      shell: bash
      working-directory: ${{runner.workspace}}/build
      run: cmake $GITHUB_WORKSPACE -DCMAKE_BUILD_TYPE=$BUILD_TYPE

    - name: Build
      working-directory: ${{runner.workspace}}/build
      shell: bash
      run: cmake --build . --config $BUILD_TYPE

    - name: Test
      working-directory: ${{runner.workspace}}/build
      shell: bash
      run: ctest -C $BUILD_TYPE
